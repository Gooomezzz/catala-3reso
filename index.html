<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Classroom</title>
  <link rel="icon" href="https://ssl.gstatic.com/classroom/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Syne+Mono&family=Cormorant:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface-2: #18181f;
      --border: rgba(255,255,255,0.06);
      --border-hi: rgba(255,255,255,0.12);
      --text: #e8e8f0;
      --text-2: #7a7a9a;
      --text-3: #44445a;
      --accent: #8f8ce8;
      --accent-2: #b8b5ff;
      --gold: #c9a84c;
      --red: #e87070;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: auto; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      opacity: 0;
      transition: opacity 0.4s;
    }
    body.ready { opacity: 1; }

    /* ── REDIRECT OVERLAY ── */
    #redirecting {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      flex-direction: column;
      gap: 1.5rem;
    }
    #redirecting.hidden { display: none; }
    .redirect-spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border-hi);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .redirect-text {
      font-family: 'Syne Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      color: var(--text-3);
      text-transform: uppercase;
    }

    /* ── APP ── */
    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2.5rem;
    }

    /* ── HERO ── */
    .hero {
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2.5rem; text-align: center;
      position: relative;
    }
    .hero::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(143,140,232,0.06) 0%, transparent 70%);
      pointer-events: none;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .hero-wordmark {
      font-family: 'Cormorant', serif;
      font-weight: 300;
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text);
      opacity: 0.9;
    }
    .hero-stats {
      display: flex; align-items: baseline;
      gap: 4rem; flex-wrap: wrap; justify-content: center;
    }
    .hero-stat { display: flex; align-items: baseline; gap: 0.5rem; }
    .hero-num {
      font-family: 'Cormorant', serif;
      font-weight: 300;
      font-size: clamp(4rem, 10vw, 7rem);
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-label {
      font-family: 'Cormorant', serif;
      font-weight: 300;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      color: var(--text-2); line-height: 1;
    }
    .hero-divider { width: 1px; height: 5rem; background: var(--border-hi); align-self: center; }

    .hint {
      position: absolute; bottom: 2.5rem;
      font-family: 'Syne Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-3);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      animation: blink 3s ease infinite;
    }

    /* ── TABS ── */
    .tabs-bar {
      display: flex; gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
      margin-top: 3rem;
    }
    .tab-btn {
      font-family: 'Syne', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
      background: none; border: none;
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: var(--text-2); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── FILE LIST ── */
    .file-search-row {
      display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem;
    }
    .file-search {
      flex: 1; background: transparent;
      border: none; border-bottom: 1px solid var(--border-hi);
      color: var(--text); font-family: 'Syne', sans-serif;
      font-size: 0.85rem; padding: 0.35rem 0; outline: none;
      transition: border-color 0.15s;
    }
    .file-search:focus { border-color: var(--accent); }
    .file-search::placeholder { color: var(--text-3); }
    .file-search-count {
      font-family: 'Syne Mono', monospace; font-size: 0.65rem;
      color: var(--text-2); white-space: nowrap; letter-spacing: 0.06em;
    }

    .file-list { border-top: 1px solid var(--border); animation: fadeUp 0.4s ease; }
    .file-row {
      display: flex; align-items: center; gap: 1.25rem;
      padding: 0.9rem 0; border-bottom: 1px solid var(--border);
      cursor: pointer; position: relative; overflow: visible;
      transition: background 0.12s;
    }
    .file-row:last-child { border-bottom: none; }
    .file-row::before {
      content: ''; position: absolute; left: -2.5rem; top: 0;
      width: 2px; height: 100%; background: var(--accent);
      transform: scaleY(0); transition: transform 0.15s;
    }
    .file-row:hover { background: rgba(255,255,255,0.02); }
    .file-row:hover::before { transform: scaleY(1); }

    .file-type-badge {
      width: 38px; height: 26px;
      border: 1px solid var(--border-hi); border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne Mono', monospace; font-size: 0.55rem;
      letter-spacing: 0.06em; color: var(--text-2);
      flex-shrink: 0; background: var(--surface);
    }
    .file-type-badge.is-html { border-color: var(--accent); color: var(--accent); }
    .file-type-badge.is-link { border-color: var(--gold); color: var(--gold); }

    .file-name {
      flex: 1; font-size: 0.9rem; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-meta-info {
      font-family: 'Syne Mono', monospace; font-size: 0.68rem;
      color: var(--text-2); white-space: nowrap;
    }
    .file-btns { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .btn-file {
      font-family: 'Syne', sans-serif; font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.35rem 0.75rem; border: 1px solid var(--border-hi);
      border-radius: 2px; background: transparent; color: var(--text-2);
      cursor: pointer; transition: 0.15s;
    }
    .btn-file:hover { color: var(--text); border-color: var(--text); }
    .btn-file.launch { border-color: rgba(143,140,232,0.4); color: var(--accent); }
    .btn-file.launch:hover { background: rgba(143,140,232,0.1); border-color: var(--accent); }

    /* ── LINKS GRID ── */
    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      animation: fadeUp 0.4s ease;
    }
    .link-card {
      border: 1px solid var(--border-hi);
      border-radius: 4px;
      padding: 1.25rem;
      background: var(--surface);
      cursor: pointer;
      transition: 0.15s;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .link-card:hover { border-color: var(--accent); background: rgba(143,140,232,0.05); }
    .link-card-name { font-size: 0.9rem; font-weight: 600; color: var(--text); }
    .link-card-url {
      font-family: 'Syne Mono', monospace; font-size: 0.6rem;
      color: var(--text-3); white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis;
    }
    .link-card-badge {
      font-family: 'Syne Mono', monospace; font-size: 0.55rem;
      color: var(--gold); border: 1px solid rgba(201,168,76,0.3);
      padding: 2px 6px; border-radius: 2px; align-self: flex-start;
    }

    /* ── GAME MODAL ── */
    .game-modal {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: var(--bg); flex-direction: column;
    }
    .game-modal.show { display: flex; }
    .game-topbar {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.6rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .game-topbar-title {
      font-family: 'Syne Mono', monospace; font-size: 0.75rem;
      color: var(--text-2); letter-spacing: 0.1em; flex: 1;
    }
    .game-close {
      background: none; border: 1px solid var(--border-hi); border-radius: 2px;
      color: var(--text-2); padding: 0.25rem 0.75rem;
      font-family: 'Syne', sans-serif; font-size: 0.65rem;
      font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; transition: 0.15s;
    }
    .game-close:hover { color: var(--red); border-color: var(--red); }
    .game-frame {
      flex: 1; width: 100%; border: none;
      background: #000;
    }

    /* ── ADD GAME FORM ── */
    .add-section {
      border-top: 1px solid var(--border);
      padding: 2rem 0 4rem;
    }
    .add-title {
      font-family: 'Cormorant', serif; font-weight: 300;
      font-size: 1.5rem; letter-spacing: 0.1em;
      color: var(--text-2); margin-bottom: 1.5rem;
      text-transform: uppercase;
    }
    .add-row { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: flex-end; }
    .add-field { display: flex; flex-direction: column; gap: 0.4rem; flex: 1; min-width: 160px; }
    .add-label {
      font-family: 'Syne Mono', monospace; font-size: 0.6rem;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3);
    }
    .add-input {
      background: transparent; border: none;
      border-bottom: 1px solid var(--border-hi);
      color: var(--text); font-family: 'Syne', sans-serif;
      font-size: 0.85rem; padding: 0.35rem 0; outline: none;
      transition: border-color 0.15s;
    }
    .add-input:focus { border-color: var(--accent); }
    .add-select {
      background: var(--surface); border: 1px solid var(--border-hi);
      border-radius: 2px; color: var(--text);
      font-family: 'Syne', sans-serif; font-size: 0.85rem;
      padding: 0.35rem 0.5rem; outline: none; cursor: pointer;
    }
    .btn-add {
      font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 0.5rem 1.25rem; border: 1px solid rgba(143,140,232,0.4);
      border-radius: 2px; background: rgba(143,140,232,0.08);
      color: var(--accent); cursor: pointer; transition: 0.15s;
      white-space: nowrap;
    }
    .btn-add:hover { background: rgba(143,140,232,0.15); border-color: var(--accent); }

    /* ── SECRET TOAST ── */
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface-2); border: 1px solid var(--accent);
      border-radius: 3px; padding: 0.65rem 1.5rem;
      font-family: 'Syne Mono', monospace; font-size: 0.72rem;
      letter-spacing: 0.1em; color: var(--accent);
      opacity: 0; transition: opacity 0.3s, transform 0.3s;
      pointer-events: none; z-index: 2000; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes blink {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    /* ── FOOTER ── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 2rem 0;
      text-align: center;
      font-family: 'Syne Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-3);
      letter-spacing: 0.1em;
    }
    
  </style>
</head>
<body>

  <!-- Pantalla de redirect mientras comprobamos -->
  <div id="redirecting">
    <div class="redirect-spinner"></div>
    <div class="redirect-text">Carregant…</div>
  </div>
  <input id="secretInput" type="password" inputmode="numeric"
  style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  opacity:0;width:1px;height:1px;border:none;outline:none;background:transparent"
  oninput="checkMobileCode(this.value)">
  <div id="authModal" style="display:none;position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,0.85);align-items:center;justify-content:center">
  <div style="background:var(--surface);border:1px solid var(--border-hi);padding:2.5rem;width:100%;max-width:360px">
    <div id="authTitle" style="font-family:'Cormorant',serif;font-weight:300;font-size:1.8rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text);margin-bottom:0.3rem">Entrar</div>
    <div id="authSub" style="font-family:'Syne Mono',monospace;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-3);margin-bottom:2rem">Accedeix al chat</div>
    <div style="display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1.1rem">
      <span style="font-family:'Syne Mono',monospace;font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-3)">Usuari</span>
      <input id="authUser" type="text" placeholder="el_teu_nom" autocomplete="off" onkeydown="if(event.key==='Enter')authSubmit()" style="background:transparent;border:none;border-bottom:1px solid var(--border-hi);color:var(--text);font-family:'Syne',sans-serif;font-size:0.9rem;padding:0.4rem 0;outline:none;width:100%">
    </div>
    <div style="display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1.1rem">
      <span style="font-family:'Syne Mono',monospace;font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-3)">Contrasenya</span>
      <input id="authPass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')authSubmit()" style="background:transparent;border:none;border-bottom:1px solid var(--border-hi);color:var(--text);font-family:'Syne',sans-serif;font-size:0.9rem;padding:0.4rem 0;outline:none;width:100%">
    </div>
    <div id="authError" style="color:var(--red);font-family:'Syne Mono',monospace;font-size:0.6rem;letter-spacing:0.06em;margin-top:0.5rem;text-align:center;min-height:1rem"></div>
    <button id="authSubmitBtn" onclick="authSubmit()" style="width:100%;padding:0.6rem;border:1px solid rgba(143,140,232,0.4);background:rgba(143,140,232,0.08);color:var(--accent);font-family:'Syne',sans-serif;font-size:0.72rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;margin-top:0.75rem">Entrar</button>
    <div style="margin-top:1.25rem;text-align:center;font-family:'Syne Mono',monospace;font-size:0.6rem;color:var(--text-3);letter-spacing:0.08em">
      <span id="authSwitchText">No tens compte?</span> <a onclick="toggleAuthMode()" style="color:var(--accent);cursor:pointer"><span id="authSwitchLink">Registra't</span></a>
    </div>
  </div>
</div>
  <!-- Web principal (oculta hasta que se introduce el código) -->
  <div class="app" id="mainApp" style="display:none">

    <section class="hero">
      <div class="hero-wordmark">Game Hub ∙ V1</div>
      <div class="hero-stats">
        <div class="hero-stat">
          <span class="hero-num" id="countGames">0</span>
          <span class="hero-label">Jocs</span>
        </div>
        <div class="hero-divider"></div>
        <div class="hero-stat">
          <span class="hero-num" id="countLinks">0</span>
          <span class="hero-label">Links</span>
        </div>
      </div>
      <div class="hint">↓ Scroll per veure els jocs</div>
    </section>

    <!-- Tabs -->
    <div class="tabs-bar">
      <button class="tab-btn active" onclick="switchTab('html')">Jocs HTML</button>
      <button class="tab-btn" onclick="switchTab('links')">Links externs</button>
      <button class="tab-btn" onclick="switchTab('chat')">Chat</button>
    </div>

    <!-- Tab HTML games -->
    <div class="tab-panel active" id="tab-html">
      <div class="file-search-row">
        <input class="file-search" id="searchHtml" type="text" placeholder="Buscar joc…" oninput="renderHtmlGames()" autocomplete="off">
        <span class="file-search-count" id="countHtmlVisible"></span>
      </div>
      <div class="file-list" id="htmlList"></div>
    </div>

    <!-- Tab Links -->
    <div class="tab-panel" id="tab-links">
      <div class="file-search-row">
        <input class="file-search" id="searchLinks" type="text" placeholder="Buscar link…" oninput="renderLinks()" autocomplete="off">
        <span class="file-search-count" id="countLinksVisible"></span>
      </div>
      <div class="links-grid" id="linksList"></div>
    </div>
    <div class="tab-panel" id="tab-chat">
  <div style="border-top:1px solid var(--border);padding:2rem 0 4rem">
    <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border)">
      <div style="width:5px;height:5px;border-radius:50%;background:#4ade80;box-shadow:0 0 5px #4ade80;animation:blink 2.2s ease infinite"></div>
      <span style="font-family:'Syne Mono',monospace;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-2);flex:1">Chat en viu</span>
      <div id="chatUserBadge" style="display:none;font-family:'Syne Mono',monospace;font-size:0.62rem;color:var(--text-2);gap:0.5rem;align-items:center">
        Connectat: <strong id="chatUserName" style="color:var(--accent-2)"></strong>
        <button onclick="fbLogout()" style="background:none;border:1px solid var(--border-hi);color:var(--text-3);font-family:'Syne',sans-serif;font-size:0.6rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:0.2rem 0.6rem;cursor:pointer">Sortir</button>
      </div>
    </div>
    <div style="border:1px solid var(--border);display:flex;flex-direction:column;height:420px;overflow:hidden">
      <div id="chatMessages" style="flex:1;overflow-y:auto;padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:0.6rem">
        <div id="chatEmpty" style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;color:var(--text-3);font-family:'Syne Mono',monospace;font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase">
          <span>Inicia sessió per xatejar</span>
          <button onclick="openAuth()" style="font-family:'Syne',sans-serif;font-size:0.72rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;padding:0.5rem 1.25rem;border:1px solid rgba(143,140,232,0.4);background:rgba(143,140,232,0.08);color:var(--accent);cursor:pointer">Entrar / Registrar-se</button>
        </div>
      </div>
      <div id="chatInputRow" style="display:none;border-top:1px solid var(--border);background:var(--surface);gap:0.75rem;padding:0.85rem 1.25rem;flex-shrink:0">
        <input id="chatInput" type="text" placeholder="Escriu un missatge…" autocomplete="off" onkeydown="if(event.key==='Enter')sendMsg()" style="flex:1;background:transparent;border:none;border-bottom:1px solid var(--border);padding:0.3rem 0;font-family:'Syne',sans-serif;font-size:0.83rem;color:var(--text);outline:none;width:100%">
        <button onclick="sendMsg()" style="font-family:'Syne',sans-serif;font-size:0.68rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:0.3rem 1rem;border:1px solid rgba(143,140,232,0.4);background:transparent;color:var(--accent);cursor:pointer;margin-top:0.5rem">Enviar</button>
      </div>
    </div>
  </div>
</div>

    <!-- Añadir juego -->
    <div class="add-section">
      <div class="add-title">Afegir joc</div>
      <div class="add-row">
        <div class="add-field">
          <span class="add-label">Nom</span>
          <input class="add-input" id="addName" type="text" placeholder="Snake, Minecraft…">
        </div>
        <div class="add-field">
          <span class="add-label">Tipus</span>
          <select class="add-select" id="addType">
            <option value="link">Link extern</option>
            <option value="html">Fitxer HTML (URL)</option>
          </select>
        </div>
        <div class="add-field" style="flex:2">
          <span class="add-label">URL / Path</span>
          <input class="add-input" id="addUrl" type="text" placeholder="https://… o games/nom.html">
        </div>
        <button class="btn-add" onclick="addGame()">+ Afegir</button>
      </div>
    </div>

    <div class="footer">Everything Hub · Runs locally · No history · No traces</div>
  </div>

  <!-- Modal del juego -->

    <div class="game-topbar">

    </div>
    <iframe class="game-frame" id="gameFrame" src="" allowfullscreen></iframe>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ════════════════════════════════════════════

    function launchGame(name, url) {
      document.getElementById("gameTitle").textContent = name;
      document.getElementById("gameFrame").src = url;
      document.getElementById("gameModal").classList.add("show");

    function closeGame() {
      document.getElementById("gameModal").classList.remove("show");
      document.getElementById("gameFrame").src = "";
    }

    function addGame() {
      const name = document.getElementById("addName").value.trim();
      const type = document.getElementById("addType").value;
      const url = document.getElementById("addUrl").value.trim();
      if (!name || !url) { showToast("⚠ Omple tots els camps"); return; }
      games[type === 'html' ? 'html' : 'links'].push({ name, url });
      saveGames();
      document.getElementById("addName").value = "";
      document.getElementById("addUrl").value = "";
      renderAll();
      showToast(`✓ "${name}" afegit`);
    }

    function removeGame(type, idx) {
      if (!confirm("Eliminar aquest joc?")) return;
      games[type].splice(idx, 1);
      saveGames();
      renderAll();
    }

    function switchTab(t) {

  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));

}

      t.textContent = msg;
      t.classList.add("show");
